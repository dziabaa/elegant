<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Apartamenty Elegant — Zapytanie</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
html, body { color-scheme: light only !important; background: #eef1f7 !important; color: #0f1e3d !important; font-family: 'DM Sans', sans-serif; margin: 0; padding: 0; }
.topbar { background: #1a2744; padding: 14px 20px; display: flex; align-items: center; gap: 12px; border-radius: 0 0 18px 18px; }
.topbar-logo { width: 36px; height: 36px; background: rgba(255,255,255,0.15); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.topbar-title { font-size: 16px; font-weight: 700; color: #fff; }
.topbar-sub { font-size: 11px; color: rgba(255,255,255,0.6); }
.wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 60px; }
.hero { background: #1a2744; border-radius: 16px; padding: 22px 20px; margin-bottom: 20px; }
.hero h1 { font-size: 22px; font-weight: 800; color: #fff; margin: 0 0 6px; }
.hero p { font-size: 13px; color: rgba(255,255,255,0.75); margin: 0; line-height: 1.5; }
.card { background: #fff; border: 1.5px solid #e4e8f0; border-radius: 16px; padding: 16px; margin-bottom: 14px; }
.lbl { font-size: 11px; font-weight: 700; color: #8a95a8; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 8px; }
.tabs { display: flex; background: #e4e8f0; border-radius: 10px; padding: 3px; gap: 6px; margin-bottom: 14px; }
.tab { flex: 1; padding: 9px 6px; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: #8a95a8; transition: all 0.2s; }
.tab.on { background: #fff; color: #1a2744; }
.cal-hdr { background: #1a2744; display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-radius: 12px 12px 0 0; }
.cal-nav { background: rgba(255,255,255,0.15); border: none; border-radius: 7px; width: 30px; height: 30px; color: #fff; font-size: 16px; cursor: pointer; }
.cal-title { font-size: 15px; font-weight: 700; color: #fff; }
.cal-body { background: #fff; border-radius: 0 0 12px 12px; padding: 10px; border: 1.5px solid #e4e8f0; border-top: none; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-dow { text-align: center; font-size: 11px; font-weight: 600; color: #8a95a8; padding: 4px 0 6px; }
.cal-dow.sun { color: #ef4444; }
.cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; border-radius: 7px; cursor: pointer; font-weight: 500; color: #0f1e3d; }
.cal-day.sun { color: #ef4444; }
.cal-day.past, .cal-day.occ { color: #ccc; cursor: default; text-decoration: line-through; background: #f8f9fb; }
.cal-day.free:hover { background: #dbe4ff; }
.cal-day.today { font-weight: 800; }
.cal-day.sel-s, .cal-day.sel-e { background: #1a2744 !important; color: #fff !important; }
.cal-day.sel-s { border-radius: 7px 0 0 7px; }
.cal-day.sel-e { border-radius: 0 7px 7px 0; }
.cal-day.sel-s.sel-e { border-radius: 7px; }
.cal-day.sel-r { background: #dbe4ff; border-radius: 0; }
.legend { display: flex; gap: 12px; padding: 8px 2px 2px; font-size: 11px; color: #8a95a8; }
.ldot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; margin-right: 4px; }
.sum { background: #fff; border: 1.5px solid #e4e8f0; border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; display: none; }
.sum-row { display: flex; gap: 8px; }
.sum-box { flex: 1; background: #f3f5f9; border-radius: 8px; padding: 8px 10px; }
.sum-lbl { font-size: 10px; font-weight: 700; color: #8a95a8; text-transform: uppercase; }
.sum-val { font-size: 15px; font-weight: 700; color: #1a2744; }
.sum-nights { text-align: center; margin-top: 8px; font-size: 13px; color: #8a95a8; }
.sum-nights b { color: #1a2744; }
input, textarea { display: block; width: 100%; box-sizing: border-box; background: #f3f5f9 !important; border: 1.5px solid #e4e8f0 !important; border-radius: 10px; padding: 11px 13px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: #0f1e3d !important; outline: none; margin-bottom: 10px; -webkit-appearance: none; }
input:focus, textarea:focus { border-color: #3b5bdb !important; }
textarea { resize: none; min-height: 80px; line-height: 1.5; }
.field-lbl { font-size: 12px; font-weight: 600; color: #0f1e3d; margin-bottom: 5px; display: block; }
.ch-wrap { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
.ch { padding: 8px 11px; border-radius: 9px; border: 1.5px solid #e4e8f0; background: #f3f5f9; color: #5a6480; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; }
.ch.on { background: #1a2744; color: #fff; border-color: #1a2744; }
.btn-send { display: block; width: 100%; box-sizing: border-box; padding: 15px; background: #1a2744; color: #fff; border: none; border-radius: 13px; font-size: 15px; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; text-align: center; margin-top: 4px; }
.ok { display: none; text-align: center; padding: 32px 16px; background: #fff; border: 1.5px solid #e4e8f0; border-radius: 16px; }
.ok h2 { font-size: 20px; font-weight: 800; color: #1a2744; margin: 12px 0 6px; }
.ok p { color: #8a95a8; font-size: 14px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <svg width="20" height="20" viewBox="0 0 110 118" fill="none"><polyline points="10,46 55,12 100,46" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><line x1="18" y1="46" x2="18" y2="64" stroke="white" stroke-width="9" stroke-linecap="round"/><line x1="92" y1="46" x2="92" y2="64" stroke="white" stroke-width="9" stroke-linecap="round"/><line x1="18" y1="64" x2="92" y2="64" stroke="white" stroke-width="9" stroke-linecap="round"/><line x1="38" y1="46" x2="38" y2="62" stroke="white" stroke-width="7" stroke-linecap="round"/><polyline points="18,74 92,74 92,83 18,83 18,93 72,93 72,103 18,103" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div>
    <div class="topbar-title">Apartamenty Elegant</div>
    <div class="topbar-sub">Przemyśl</div>
  </div>
</div>

<div class="wrap">
  <div class="hero">
    <h1>Sprawdź dostępność</h1>
    <p>Wybierz apartament i daty, wyślij zapytanie o cenę.</p>
  </div>

  <div class="lbl">Apartament</div>
  <div class="tabs" id="apt-tabs"></div>

  <div class="lbl">Termin pobytu</div>
  <div style="border-radius:12px;overflow:hidden;margin-bottom:10px">
    <div class="cal-hdr">
      <button class="cal-nav" onclick="CM(-1)">‹</button>
      <div class="cal-title" id="cal-title"></div>
      <button class="cal-nav" onclick="CM(1)">›</button>
    </div>
    <div class="cal-body">
      <div class="cal-grid" id="cal-grid"></div>
      <div class="legend">
        <span><span class="ldot" style="background:#f8f9fb;border:1.5px solid #ccc"></span>Zajęty</span>
        <span><span class="ldot" style="background:#1a2744"></span>Wybrany</span>
      </div>
    </div>
  </div>

  <div class="sum" id="sum">
    <div class="sum-row">
      <div class="sum-box"><div class="sum-lbl">Przyjazd</div><div class="sum-val" id="s-from"></div></div>
      <div class="sum-box"><div class="sum-lbl">Wyjazd</div><div class="sum-val" id="s-to"></div></div>
    </div>
    <div class="sum-nights" id="s-nights"></div>
  </div>

  <div class="card" id="form-card">
    <div style="font-size:15px;font-weight:700;color:#1a2744;margin-bottom:14px">Zapytanie o ofertę</div>
    <label class="field-lbl">Imię i nazwisko *</label>
    <input type="text" id="fn" placeholder="np. Jan Kowalski">
    <label class="field-lbl">Telefon *</label>
    <input type="tel" id="fp" placeholder="+48 600 000 000">
    <label class="field-lbl">E-mail</label>
    <input type="email" id="fe" placeholder="jan@gmail.com">
    <label class="field-lbl">Liczba gości</label>
    <input type="number" id="fg" placeholder="np. 2" min="1">
    <label class="field-lbl">Preferowany kontakt *</label>
    <div class="ch-wrap">
      <button class="ch on" data-ch="whatsapp" onclick="SCH(this)">💬 WhatsApp</button>
      <button class="ch" data-ch="sms" onclick="SCH(this)">✉️ SMS</button>
      <button class="ch" data-ch="email" onclick="SCH(this)">📧 E-mail</button>
    </div>
    <label class="field-lbl">Uwagi</label>
    <textarea id="fnote" placeholder="Pytania, uwagi..."></textarea>
    <button class="btn-send" onclick="SEND()">Wyślij zapytanie →</button>
  </div>

  <div class="ok" id="ok-card">
    <div style="font-size:48px">✅</div>
    <h2>Wysłano!</h2>
    <p id="ok-msg">Dziękujemy! Odpowiemy najszybciej jak to możliwe.</p>
    <button class="btn-send" style="margin-top:20px" onclick="RESET()">Nowe zapytanie</button>
  </div>
</div>

<script>
var PHONE = '48605207857';
var EMAIL = 'marcin.bruchal@gmail.com';
var apts = JSON.parse(localStorage.getItem('apts') || 'null') || [
  {id:1, name:'Elegant 1', bookings:[], icalEvents:[], icalEventsAirbnb:[]},
  {id:2, name:'Elegant 2', bookings:[], icalEvents:[], icalEventsAirbnb:[]}
];
var aptIdx = 0;
var selS = null, selE = null;
var CY = new Date().getFullYear(), CM2 = new Date().getMonth();
var ch = 'whatsapp';
var MONTHS = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];

function occ() {
  var s = new Set();
  var a = apts[aptIdx];
  var all = (a.bookings||[]).concat(a.icalEvents||[]).concat(a.icalEventsAirbnb||[]);
  all.forEach(function(b){
    if(!b.from||!b.to) return;
    var d = new Date(b.from), e = new Date(b.to);
    while(d<e){ s.add(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
  });
  return s;
}

function buildTabs() {
  document.getElementById('apt-tabs').innerHTML = apts.map(function(a,i){
    return '<button class="tab'+(i===aptIdx?' on':'')+'" onclick="SA('+i+')">'+a.name+'</button>';
  }).join('');
}

function SA(i){ aptIdx=i; selS=null; selE=null; buildTabs(); RC(); US(); }

function CM(d){ CM2+=d; if(CM2>11){CM2=0;CY++;} if(CM2<0){CM2=11;CY--;} RC(); }

function fmtD(ds){ return ds.split('-').reverse().join('.'); }

function RC() {
  document.getElementById('cal-title').textContent = MONTHS[CM2]+' '+CY;
  var today = new Date().toISOString().slice(0,10);
  var occupied = occ();
  var DAYS = ['Pn','Wt','Śr','Cz','Pt','So','Nd'];
  var h = DAYS.map(function(d,i){ return '<div class="cal-dow'+(i===6?' sun':'')+'">'+(d)+'</div>'; }).join('');
  var sd = new Date(CY,CM2,1).getDay(); sd = sd===0?6:sd-1;
  var dim = new Date(CY,CM2+1,0).getDate();
  for(var i=0;i<sd;i++) h+='<div></div>';
  for(var d=1;d<=dim;d++){
    var ds = CY+'-'+String(CM2+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var sun = new Date(ds).getDay()===0;
    var past = ds<today, oc = occupied.has(ds);
    var cls = 'cal-day';
    if(past||oc) cls+=' '+(past?'past':'occ');
    else cls+=' free';
    if(sun) cls+=' sun';
    if(selS&&selE){
      var lo=selS<=selE?selS:selE, hi=selS<=selE?selE:selS;
      if(ds===lo&&ds===hi) cls+=' sel-s sel-e';
      else if(ds===lo) cls+=' sel-s';
      else if(ds===hi) cls+=' sel-e';
      else if(ds>lo&&ds<hi) cls+=' sel-r';
    } else if(selS&&ds===selS) cls+=' sel-s sel-e';
    var click = (!past&&!oc) ? ' onclick="DC(\''+ds+'\')"' : '';
    h+='<div class="'+cls+'"'+click+'>'+d+'</div>';
  }
  document.getElementById('cal-grid').innerHTML = h;
}

function DC(ds){
  if(!selS||(selS&&selE)){ selS=ds; selE=null; }
  else {
    if(ds===selS){ selS=null; selE=null; }
    else { var lo=ds>selS?selS:ds, hi=ds>selS?ds:selS; selS=lo; selE=hi; }
  }
  RC(); US();
}

function US(){
  var el = document.getElementById('sum');
  if(selS&&selE){
    el.style.display='block';
    document.getElementById('s-from').textContent = fmtD(selS);
    document.getElementById('s-to').textContent = fmtD(selE);
    var n = Math.round((new Date(selE)-new Date(selS))/86400000);
    document.getElementById('s-nights').innerHTML = '<b>'+n+'</b> '+(n===1?'noc':n<5?'noce':'nocy');
  } else { el.style.display='none'; }
}

function SCH(btn){
  ch = btn.dataset.ch;
  document.querySelectorAll('.ch').forEach(function(b){
    b.classList.toggle('on', b===btn);
    b.style.background = b===btn ? '#1a2744' : '#f3f5f9';
    b.style.color = b===btn ? '#fff' : '#5a6480';
    b.style.borderColor = b===btn ? '#1a2744' : '#e4e8f0';
  });
}

function SEND(){
  var name = document.getElementById('fn').value.trim();
  var phone = document.getElementById('fp').value.trim();
  var email = document.getElementById('fe').value.trim();
  var people = document.getElementById('fg').value.trim();
  var note = document.getElementById('fnote').value.trim();
  if(!name){ alert('Wpisz imię i nazwisko'); return; }
  if(!phone){ alert('Wpisz numer telefonu'); return; }
  if(!selS||!selE){ alert('Wybierz daty pobytu'); return; }

  var apt = apts[aptIdx];
  var n = Math.round((new Date(selE)-new Date(selS))/86400000);
  var msg = '🏠 ZAPYTANIE O REZERWACJĘ\n\n'
    +'Apartament: '+apt.name+'\n'
    +'Termin: '+fmtD(selS)+' – '+fmtD(selE)+' ('+n+' '+(n===1?'noc':n<5?'noce':'nocy')+')\n'
    +'Gość: '+name+'\n'
    +'Telefon: '+phone
    +(email?'\nE-mail: '+email:'')
    +(people?'\nLiczba osób: '+people:'')
    +(note?'\nUwagi: '+note:'');

  var enc = encodeURIComponent(msg);
  var url = '';
  if(ch==='whatsapp')  url='https://wa.me/'+PHONE+'?text='+enc;
  if(ch==='sms')       url='sms:+'+PHONE+'?body='+enc;
  if(ch==='email')     url='mailto:'+EMAIL+'?subject='+encodeURIComponent('Zapytanie - '+apt.name)+'&body='+enc;

  document.getElementById('ok-msg').textContent = 'Dziękujemy '+name+'! Skontaktujemy się wkrótce.';
  document.getElementById('form-card').style.display='none';
  document.getElementById('ok-card').style.display='block';
  window.location.href = url;
}

function RESET(){
  selS=null; selE=null;
  ['fn','fp','fe','fg','fnote'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('form-card').style.display='block';
  document.getElementById('ok-card').style.display='none';
  RC(); US();
}

buildTabs();
RC();
</script>

</body>
</html>
